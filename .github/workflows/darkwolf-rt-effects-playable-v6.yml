name: DarkWolf RTCW RT Effects Playable v6

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options: [Release, Debug]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install deterministic Playable v6 source snapshots
        shell: pwsh
        run: ./scripts/apply-darkwolf-rt-effects-playable-v6.ps1

      - name: Verify Playable v6 source and profiles
        shell: pwsh
        run: ./scripts/verify-darkwolf-rt-effects-playable-v6.ps1

      - name: Compile-check embedded Playable v6 HLSL
        shell: pwsh
        run: ./scripts/validate-darkwolf-rt-effects-playable-v6-hlsl.ps1

      - name: Build Playable v6 Windows runtime
        shell: pwsh
        run: ./scripts/build-windows-clean-release.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Package Playable v6 runtime and profiles
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/main -Force | Out-Null
          $bats = @(
            'RUN_RT_ALL_BALANCED.bat',
            'RUN_RT_ALL_QUALITY.bat',
            'RUN_RT_ALL_PERFORMANCE.bat',
            'RUN_RT_ALL_BALANCED_ESCAPE1_TEST.bat',
            'RUN_RT_DISABLE_V6.bat',
            'VERIFY_RT_PLAYABLE_V6_INSTALL.bat'
          )
          foreach ($bat in $bats) { Copy-Item (Join-Path 'test-bats' $bat) dist/ -Force }
          Get-ChildItem main -Filter 'dxr_v6_*.cfg' -File | ForEach-Object { Copy-Item $_.FullName dist/main/ -Force }
          Copy-Item README_DARKWOLF_RT_EFFECTS_PLAYABLE_V6_RU.md dist/ -Force
          Copy-Item docs/DARKWOLF_RT_EFFECTS_PLAYABLE_V6_CVARS_RU.md dist/ -Force
          Copy-Item CHANGELOG_DARKWOLF_RT_EFFECTS_PLAYABLE_V6_RU.md dist/ -Force

      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length

      - name: Upload Playable v6 artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolfRTCW-RT-Effects-Playable-v6-${{ inputs.configuration }}
          path: dist/**
          if-no-files-found: error
