// DarkWolfRTCW RT Effects Playable v6.1 - direct component pipeline test
set developer 1
set logfile 2
set r_dxr 1
set r_dxrSafeMode 1
set r_dxrAsyncSubmit 0
set r_dxrCpuSync 1
set r_dxrBuildInterval 1
set r_dxrDispatchInterval 1

set r_dxrDebug 1
set r_dxrDebugMode 0
set r_dxrDebugEffect 10

// Correct plural cvar. The source also force-enables the dynamic-light branch
// only while this diagnostics-only fallback probe is requested.
set r_dxrDynamicLights 1
set r_dxrFallbackLight 1
set r_dxrFallbackLightRadius 1000
set r_dxrFallbackLightIntensity 8
set r_dxrDirectLightingStrength 1

// Direct debug components must bypass all of these stages. They are also
// disabled here so the console test remains self-documenting.
set r_dxrDenoiser 0
set r_dxrTemporal 0
set r_dxrTonemap 0
set r_dxrBloom 0
set r_dxrSaturation 1
set r_dxrContrast 1
set r_dxrOutputGamma 1
set r_dxrHistoryReset 1

echo "DXR v6.1 debug loaded: 10=red 11=green 12=blue 8=albedo 3=sun 6=direct"
