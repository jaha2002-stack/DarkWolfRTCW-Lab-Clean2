// DarkWolf RTCW DXR Final Stable Visible v7
// Proven Clean Release relighting + stable synchronous v6 submission.
// Runtime-safe profile. All RT effects are enabled.

developer 0
logfile 0
cg_drawFPS 1

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 4
set r_dxrFenceWaitMs 10000
set r_dxrAsyncSubmit 0
set r_dxrCpuSync 1
set r_dxrBuildInterval 1
set r_dxrDispatchInterval 1

set r_dxrNativeResolution 1
set r_dxrUpscalerBackend 0
set r_dxrUpscalerQuality 0
set r_dxrRayAIDenoise 0
set r_dxrDLSSRayReconstruction 0
set r_dxrFSRRayRegeneration 0

set r_picmip 0
set r_picmip2 0
set r_simpleMipMaps 0
set r_detailTextures 1
set r_textureMode GL_LINEAR_MIPMAP_LINEAR

// Clean Release-like image. The warm opt-in fill is the key part of the old screenshot.
set r_dxrFallbackLight 1
set r_dxrFallbackLightRadius 900
set r_dxrFallbackLightIntensity 6.0
set r_dxrAmbientIntensity 1.25
set r_dxrLegacyBlend 0.60
set r_dxrExposure 1.05
set r_dxrLightmapStrength 1.00

set r_dxrShadows 1
set r_dxrShadowStrength 1.00
set r_dxrShadowSamples 2
set r_dxrShadowSoftness 0.65
set r_dxrShadowMaxDistance 4096
set r_dxrShadowCullMode 0
set r_dxrShadowBias 0.065
set r_dxrShadowMinVisibility 0.04
set r_dxrContactShadows 1
set r_dxrContactShadowLength 96
set r_dxrShadowLightmapStrength 0.85

set r_dxrDynamicLights 1
set r_dxrDynamicLightShadows 1
set r_dxrMaxLights 32
set r_dxrDynamicLightIntensityScale 0.90
set r_dxrDynamicLightRadiusScale 0.95
set r_dxrPointLightIntensityCap 8.00
set r_dxrRectLightIntensityCap 4.50
set r_dxrLightRadiusMin 32
set r_dxrLightRadiusMax 3072
set r_dxrLightSelectionMode 1
set r_dxrLightSelectionHysteresis 0.20
set r_dxrLightSelectionMinScore 0.0001
set r_dxrDirectLightingStrength 1.05

set r_dxrSun 1
set r_dxrSunIntensity 0.45
set r_dxrSunDirX -0.45
set r_dxrSunDirY 0.25
set r_dxrSunDirZ 0.86
set r_dxrSunColorR 1.00
set r_dxrSunColorG 0.93
set r_dxrSunColorB 0.82
set r_dxrSunAngularRadius 0.35
set r_dxrSunShadowSamples 1

set r_dxrAO 1
set r_dxrAOStrength 0.38
set r_dxrAORadius 24
set r_dxrAOSamples 2
set r_dxrAOLightmapStrength 0.65

set r_dxrReflections 1
set r_dxrReflectionStrength 0.16
set r_dxrReflectionMaxDistance 768
set r_dxrReflectionRoughness 0.35
set r_dxrReflectionSamples 1

set r_dxrSky 1
set r_dxrSkyStrength 0.26
set r_dxrSkySamples 1
set r_dxrSkyMaxDistance 4096

set r_dxrGI 1
set r_dxrGIStrength 0.11
set r_dxrGISamples 1
set r_dxrGIMaxDistance 192

set r_dxrSpecular 1
set r_dxrSpecularStrength 1.00
set r_dxrSpecularPower 48

// Spatial-only cleanup: avoids the old screen-door grain without temporal ghosting.
set r_dxrDenoiser 1
set r_dxrDenoiserRadius 1
set r_dxrDenoiserStrength 0.68
set r_dxrDenoiserDepthSigma 180
set r_dxrDenoiserNormalSigma 28
set r_dxrTemporal 0
set r_dxrTemporalWeight 0.45
set r_dxrTemporalClamp 0.06
set r_dxrTemporalMaxFrames 4

// Preserve the old RTCW/Clean Release color response, with only a highlight guard.
set r_dxrRadianceClamp 5.50
set r_dxrHighlightCompression 0.80
set r_dxrTonemap 0
set r_dxrBloom 0
set r_dxrBloomStrength 0.0
set r_dxrSaturation 1.02
set r_dxrContrast 1.02
set r_dxrOutputGamma 1.00

set r_dxrDebug 0
set r_dxrDebugMode 0
set r_dxrDebugEffect 0
set r_dxrHistoryReset 1
