exec dxr_lab_common.cfg
// Tests real map lights/torches without the camera-relative fallback light.
seta r_dxrFallbackLight 0
seta r_dxrDynamicLights 1
seta r_dxrDynamicLightShadows 1
seta r_dxrMaxLights 24
seta r_dxrDynamicLightIntensityScale 1.10
seta r_dxrDynamicLightRadiusScale 1.0
seta r_dxrSun 0
seta r_dxrAO 0
seta r_dxrReflections 0
seta r_dxrSky 0
seta r_dxrGI 0
seta r_dxrShadowSamples 4
seta r_dxrShadowSoftness 0.65
seta r_dxrDenoiser 1
seta r_dxrDenoiserRadius 1
seta r_dxrDenoiserStrength 0.55
vid_restart
spdevmap escape1
