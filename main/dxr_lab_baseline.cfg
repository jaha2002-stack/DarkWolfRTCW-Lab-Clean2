exec dxr_lab_common.cfg
// Direct comparison with Performance v2: native resolution, classic output,
// dynamic lights and low-cost hard RT shadows; no denoiser/post effects.
seta r_dxrFallbackLight 1
seta r_dxrShadowSamples 1
seta r_dxrShadowSoftness 0.0
seta r_dxrDenoiser 0
seta r_dxrTemporal 0
vid_restart
spdevmap escape1
