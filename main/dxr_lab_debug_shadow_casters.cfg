exec dxr_lab_common.cfg
// Diagnostic view for missing iron-door/grille/torch-bracket casters.
seta r_dxrDebug 1
seta r_dxrDebugEffect 1
seta r_dxrFallbackLight 1
seta r_dxrFallbackLightRadius 1200
seta r_dxrFallbackLightIntensity 9.0
seta r_dxrShadows 1
seta r_dxrShadowSamples 1
seta r_dxrShadowSoftness 0.0
seta r_dxrShadowStrength 1.0
seta r_dxrShadowMinVisibility 0.0
seta r_dxrShadowCullMode 0
seta r_dxrDynamicLights 1
seta r_dxrSun 0
seta r_dxrAO 0
seta r_dxrReflections 0
seta r_dxrSky 0
seta r_dxrGI 0
seta r_dxrDenoiser 0
seta r_dxrTemporal 0
vid_restart
spdevmap escape1
