exec dxr_lab_common.cfg
// Grain/veil test around torches. Temporal has no motion-vector reprojection,
// so use this profile to judge stationary and slow-camera scenes first.
seta r_dxrFallbackLight 0
seta r_dxrDynamicLights 1
seta r_dxrShadowSamples 3
seta r_dxrShadowSoftness 0.65
seta r_dxrDenoiser 1
seta r_dxrDenoiserRadius 1
seta r_dxrDenoiserStrength 0.68
seta r_dxrTemporal 1
seta r_dxrTemporalWeight 0.64
seta r_dxrTemporalClamp 0.08
seta r_dxrTemporalResetThreshold 0.015
set r_dxrHistoryReset 1
vid_restart
spdevmap escape1
