exec dxr_lab_common.cfg
// Experimental quality profile. Native resolution is retained, so this can be heavy.
seta r_dxrFallbackLight 0
seta r_dxrBuildInterval 1
seta r_dxrShadows 1
seta r_dxrShadowSamples 6
seta r_dxrShadowSoftness 0.90
seta r_dxrShadowStrength 1.10
seta r_dxrDynamicLights 1
seta r_dxrMaxLights 24
seta r_dxrDynamicLightShadows 1
seta r_dxrSun 1
seta r_dxrSunIntensity 0.90
seta r_dxrSunShadowSamples 5
seta r_dxrAO 1
seta r_dxrAOSamples 8
seta r_dxrAOStrength 0.42
seta r_dxrReflections 1
seta r_dxrReflectionSamples 2
seta r_dxrReflectionStrength 0.20
seta r_dxrSky 1
seta r_dxrSkySamples 4
seta r_dxrSkyStrength 0.38
seta r_dxrGI 1
seta r_dxrGISamples 2
seta r_dxrGIStrength 0.13
seta r_dxrSpecular 1
seta r_dxrSpecularStrength 1.10
seta r_dxrDenoiser 1
seta r_dxrDenoiserRadius 2
seta r_dxrDenoiserStrength 0.68
seta r_dxrTemporal 1
seta r_dxrTemporalWeight 0.58
seta r_dxrTemporalClamp 0.08
seta r_dxrTonemap 1
seta r_dxrHDRWhitePoint 2.2
seta r_dxrBloom 1
seta r_dxrBloomStrength 0.05
seta r_dxrBloomThreshold 1.25
set r_dxrHistoryReset 1
vid_restart
spdevmap escape1
