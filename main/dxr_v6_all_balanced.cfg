// DarkWolfRTCW RT Effects Playable v6 - ALL BALANCED
// Runtime cvars only. No renderer restart is issued by this profile.

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 8
set r_dxrFenceWaitMs 10000

// Confirmed stable submission path from tests 1-5.
set r_dxrAsyncSubmit 0
set r_dxrCpuSync 1
set r_dxrBuildInterval 1
set r_dxrDispatchInterval 1

// No camera-attached diagnostic lamp in gameplay.
set r_dxrFallbackLight 0
set r_dxrDebug 0
set r_dxrDebugMode 0
set r_dxrDebugEffect 0

// Preserve the authored RTCW lightmap and add bounded RT components.
set r_dxrAmbientIntensity 0.80
set r_dxrLegacyBlend 1.00
set r_dxrLightmapStrength 1.00
set r_dxrDirectLightingStrength 0.18
set r_dxrExposure 0.97
set r_dxrAOLightmapStrength 0.18
set r_dxrShadowLightmapStrength 0.14

// Pre-composite HDR guard. Prevents the sudden white rooms seen in test 5.
set r_dxrRadianceClamp 3.00
set r_dxrHighlightCompression 1.60
set r_dxrTonemap 2
set r_dxrHDRWhitePoint 2.60
set r_dxrBloom 1
set r_dxrBloomStrength 0.018
set r_dxrBloomThreshold 1.45
set r_dxrSaturation 1.02
set r_dxrContrast 1.00
set r_dxrOutputGamma 1.04

// Importance-based real game light selection and legacy intensity normalization.
set r_dxrDynamicLights 1
set r_dxrDynamicLightShadows 1
set r_dxrMaxLights 20
set r_dxrDynamicLightIntensityScale 0.65
set r_dxrDynamicLightRadiusScale 0.88
set r_dxrPointLightIntensityCap 3.00
set r_dxrRectLightIntensityCap 1.90
set r_dxrLightRadiusMin 48
set r_dxrLightRadiusMax 2048
set r_dxrLightSelectionMode 1
set r_dxrLightSelectionHysteresis 0.20
set r_dxrLightSelectionMinScore 0.0005

// Ray-traced shadows. One stochastic sample is stabilized by the denoiser.
set r_dxrShadows 1
set r_dxrShadowStrength 0.74
set r_dxrShadowSamples 1
set r_dxrShadowSoftness 0.42
set r_dxrShadowBias 0.075
set r_dxrShadowMaxDistance 3072
set r_dxrShadowCullMode 0
set r_dxrShadowMinVisibility 0.16
set r_dxrContactShadows 1
set r_dxrContactShadowLength 80

// Low-cost directional sun: visible outdoors, naturally occluded indoors.
set r_dxrSun 1
set r_dxrSunIntensity 0.22
set r_dxrSunDirX -0.45
set r_dxrSunDirY 0.25
set r_dxrSunDirZ 0.86
set r_dxrSunColorR 1.00
set r_dxrSunColorG 0.93
set r_dxrSunColorB 0.82
set r_dxrSunAngularRadius 0.28
set r_dxrSunShadowSamples 1

// All secondary effects enabled with campaign-safe ray budgets.
set r_dxrAO 1
set r_dxrAOStrength 0.25
set r_dxrAORadius 22
set r_dxrAOSamples 1

set r_dxrReflections 1
set r_dxrReflectionStrength 0.060
set r_dxrReflectionMaxDistance 704
set r_dxrReflectionRoughness 0.42
set r_dxrReflectionSamples 1

set r_dxrSky 1
set r_dxrSkyStrength 0.14
set r_dxrSkySamples 1
set r_dxrSkyMaxDistance 4096

set r_dxrGI 1
set r_dxrGIStrength 0.055
set r_dxrGISamples 1
set r_dxrGIMaxDistance 176

set r_dxrSpecular 1
set r_dxrSpecularStrength 0.35
set r_dxrSpecularPower 64

// Edge-aware spatial cleanup plus static-camera temporal stabilization.
// History resets on camera translation/rotation, map load, resize and manual reset.
set r_dxrDenoiser 1
set r_dxrDenoiserRadius 1
set r_dxrDenoiserStrength 0.82
set r_dxrDenoiserDepthSigma 180
set r_dxrDenoiserNormalSigma 30
set r_dxrTemporal 1
set r_dxrTemporalWeight 0.52
set r_dxrTemporalClamp 0.075
set r_dxrTemporalResetThreshold 0.003
set r_dxrTemporalPositionThreshold 0.10
set r_dxrTemporalRotationThreshold 0.0015
set r_dxrTemporalMaxFrames 8
set r_dxrHistoryReset 1
