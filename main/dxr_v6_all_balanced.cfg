// DarkWolfRTCW RT Effects Playable v6.2 - VERIFIED GAMEPLAY BALANCED
// v6.1 confirmed direct/sun/albedo component transport. v6.2 activates the
// bounded gameplay composite. Runtime cvars only; no renderer restart command.

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 8
set r_dxrFenceWaitMs 10000

// Confirmed stable synchronous submission path.
set r_dxrAsyncSubmit 0
set r_dxrCpuSync 1
set r_dxrBuildInterval 1
set r_dxrDispatchInterval 1

// Never carry diagnostic state into campaign play.
set r_dxrFallbackLight 0
set r_dxrDebug 0
set r_dxrDebugMode 0
set r_dxrDebugEffect 0

// Authored RTCW base plus clearly visible, bounded RT components.
set r_dxrAmbientIntensity 0.82
set r_dxrLegacyBlend 0.94
set r_dxrLightmapStrength 1.00
set r_dxrDirectLightingStrength 0.34
set r_dxrExposure 0.96
set r_dxrAOLightmapStrength 0.30
set r_dxrShadowLightmapStrength 0.34

// HDR safety before the final composite.
set r_dxrRadianceClamp 2.85
set r_dxrHighlightCompression 1.75
set r_dxrTonemap 2
set r_dxrHDRWhitePoint 2.60
set r_dxrBloom 1
set r_dxrBloomStrength 0.016
set r_dxrBloomThreshold 1.55
set r_dxrSaturation 1.02
set r_dxrContrast 1.00
set r_dxrOutputGamma 1.03

// Nearest/most important real game lights. No camera light.
set r_dxrDynamicLights 1
set r_dxrDynamicLightShadows 1
set r_dxrMaxLights 24
set r_dxrDynamicLightIntensityScale 0.74
set r_dxrDynamicLightRadiusScale 0.90
set r_dxrPointLightIntensityCap 3.00
set r_dxrRectLightIntensityCap 1.90
set r_dxrLightRadiusMin 48
set r_dxrLightRadiusMax 2048
set r_dxrLightSelectionMode 1
set r_dxrLightSelectionHysteresis 0.20
set r_dxrLightSelectionMinScore 0.0005

// RT shadows and contact shadows.
set r_dxrShadows 1
set r_dxrShadowStrength 0.78
set r_dxrShadowSamples 1
set r_dxrShadowSoftness 0.44
set r_dxrShadowBias 0.080
set r_dxrShadowMaxDistance 3072
set r_dxrShadowCullMode 0
set r_dxrShadowMinVisibility 0.18
set r_dxrContactShadows 1
set r_dxrContactShadowLength 72

// Directional sun, naturally shadowed indoors.
set r_dxrSun 1
set r_dxrSunIntensity 0.30
set r_dxrSunDirX -0.45
set r_dxrSunDirY 0.25
set r_dxrSunDirZ 0.86
set r_dxrSunColorR 1.00
set r_dxrSunColorG 0.93
set r_dxrSunColorB 0.82
set r_dxrSunAngularRadius 0.30
set r_dxrSunShadowSamples 1

// Campaign-safe one-ray budgets; every component remains independently
// switchable from the console.
set r_dxrAO 1
set r_dxrAOStrength 0.30
set r_dxrAORadius 24
set r_dxrAOSamples 1

set r_dxrReflections 1
set r_dxrReflectionStrength 0.10
set r_dxrReflectionMaxDistance 768
set r_dxrReflectionRoughness 0.38
set r_dxrReflectionSamples 1

set r_dxrSky 1
set r_dxrSkyStrength 0.18
set r_dxrSkySamples 1
set r_dxrSkyMaxDistance 4096

set r_dxrGI 1
set r_dxrGIStrength 0.080
set r_dxrGISamples 1
set r_dxrGIMaxDistance 192

set r_dxrSpecular 1
set r_dxrSpecularStrength 0.50
set r_dxrSpecularPower 56

// Edge-aware spatial cleanup. Temporal is conservative and resets on camera
// movement/map changes to avoid long trails.
set r_dxrDenoiser 1
set r_dxrDenoiserRadius 1
set r_dxrDenoiserStrength 0.82
set r_dxrDenoiserDepthSigma 180
set r_dxrDenoiserNormalSigma 30
set r_dxrTemporal 1
set r_dxrTemporalWeight 0.46
set r_dxrTemporalClamp 0.060
set r_dxrTemporalResetThreshold 0.003
set r_dxrTemporalPositionThreshold 0.10
set r_dxrTemporalRotationThreshold 0.0015
set r_dxrTemporalMaxFrames 6
set r_dxrHistoryReset 1
