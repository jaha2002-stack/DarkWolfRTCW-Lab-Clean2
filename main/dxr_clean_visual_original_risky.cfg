// DarkWolf RTCW DXR Clean Visual Original/Risky
// As close as possible to the old Clean Release visible RT look.
developer 0
logfile 0
cg_drawFPS 1

seta r_dxrSafeMode 1
seta r_dxrErrorLimit 2
seta r_dxrFenceWaitMs 4000

seta r_dxr 1
seta r_dxrDebug 0
seta r_dxrDebugMode 0
seta r_novis 0

seta r_dxrFallbackLight 1
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 8.0
seta r_dxrAmbientIntensity 1.35
seta r_dxrLegacyBlend 0.65
seta r_dxrExposure 1.15
seta r_dxrShadowBias 0.05

vid_restart
spdevmap escape1
