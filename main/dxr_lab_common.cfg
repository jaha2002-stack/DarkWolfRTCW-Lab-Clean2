// DarkWolf RTCW DXR CleanVisual RT Effects Lab - stable common base.
// Preserves Performance v2, classic RTCW composite and full-resolution textures.
developer 0
logfile 0
cg_drawFPS 1

seta r_dxr 1
seta r_dxrSafeMode 1
seta r_dxrErrorLimit 2
seta r_dxrFenceWaitMs 2500
seta r_dxrAsyncSubmit 1
seta r_dxrCpuSync 0
seta r_dxrBuildInterval 2
seta r_dxrDispatchInterval 1

// Native/full-resolution compatibility renderer. These are latched.
seta r_dxrNativeResolution 1
seta r_dxrUpscalerBackend 0
seta r_dxrUpscalerQuality 0
seta r_dxrUpscalerSharpness 0.20
seta r_dxrRayAIDenoise 0
seta r_dxrDLSSRayReconstruction 0
seta r_dxrFSRRayRegeneration 0

// Preserve original/HD texture resolution and filtering.
seta r_picmip 0
seta r_picmip2 0
seta r_simpleMipMaps 0
seta r_detailTextures 1
seta r_textureMode GL_LINEAR_MIPMAP_LINEAR

// Proven Clean Release appearance.
seta r_dxrAmbientIntensity 1.35
seta r_dxrLegacyBlend 0.65
seta r_dxrExposure 1.15
seta r_dxrShadowBias 0.02
seta r_dxrDebug 0
seta r_dxrDebugMode 0
seta r_dxrDebugEffect 0
seta r_novis 0

// Shadow baseline. Cull 0 is important for thin/two-sided geometry.
seta r_dxrShadows 1
seta r_dxrShadowStrength 1.0
seta r_dxrShadowSamples 2
seta r_dxrShadowSoftness 0.65
seta r_dxrShadowMaxDistance 4096
seta r_dxrShadowCullMode 0
seta r_dxrShadowMinVisibility 0.02
seta r_dxrContactShadows 1
seta r_dxrContactShadowLength 128

// Map/torch dynamic lights.
seta r_dxrDynamicLights 1
seta r_dxrMaxLights 16
seta r_dxrDynamicLightIntensityScale 1.0
seta r_dxrDynamicLightRadiusScale 1.0
seta r_dxrDynamicLightShadows 1
seta r_dxrFallbackLight 0
seta r_dxrFallbackLightRadius 900
seta r_dxrFallbackLightIntensity 8.0

// Optional effects are disabled in the common baseline.
seta r_dxrSun 0
seta r_dxrSunIntensity 1.10
seta r_dxrSunDirX -0.45
seta r_dxrSunDirY 0.25
seta r_dxrSunDirZ 0.86
seta r_dxrSunColorR 1.00
seta r_dxrSunColorG 0.93
seta r_dxrSunColorB 0.82
seta r_dxrSunAngularRadius 0.35
seta r_dxrSunShadowSamples 2

seta r_dxrAO 0
seta r_dxrAOStrength 0.45
seta r_dxrAORadius 24
seta r_dxrAOSamples 4

seta r_dxrReflections 0
seta r_dxrReflectionStrength 0.18
seta r_dxrReflectionMaxDistance 1536
seta r_dxrReflectionRoughness 0.35
seta r_dxrReflectionSamples 1

seta r_dxrSky 0
seta r_dxrSkyStrength 0.35
seta r_dxrSkySamples 2
seta r_dxrSkyMaxDistance 8192

seta r_dxrGI 0
seta r_dxrGIStrength 0.10
seta r_dxrGISamples 1
seta r_dxrGIMaxDistance 256

seta r_dxrSpecular 1
seta r_dxrSpecularStrength 1.0
seta r_dxrSpecularPower 48

seta r_dxrDenoiser 0
seta r_dxrDenoiserRadius 1
seta r_dxrDenoiserStrength 0.55
seta r_dxrDenoiserDepthSigma 160
seta r_dxrDenoiserNormalSigma 24

seta r_dxrTemporal 0
seta r_dxrTemporalWeight 0.68
seta r_dxrTemporalClamp 0.10
seta r_dxrTemporalResetThreshold 0.02
set r_dxrHistoryReset 1

// Classic output by default. Post-processing can be enabled independently.
seta r_dxrTonemap 0
seta r_dxrHDRWhitePoint 2.0
seta r_dxrBloom 0
seta r_dxrBloomStrength 0.08
seta r_dxrBloomThreshold 1.15
seta r_dxrSaturation 1.0
seta r_dxrContrast 1.0
seta r_dxrOutputGamma 1.0
