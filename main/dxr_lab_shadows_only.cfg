exec dxr_lab_common.cfg
// Isolated shadow test. Fallback light guarantees a visible test light.
seta r_dxrFallbackLight 1
seta r_dxrFallbackLightRadius 1100
seta r_dxrFallbackLightIntensity 8.0
seta r_dxrSun 0
seta r_dxrAO 0
seta r_dxrReflections 0
seta r_dxrSky 0
seta r_dxrGI 0
seta r_dxrShadowSamples 4
seta r_dxrShadowSoftness 0.70
seta r_dxrShadowStrength 1.10
seta r_dxrShadowMinVisibility 0.0
seta r_dxrDenoiser 1
seta r_dxrDenoiserRadius 1
seta r_dxrDenoiserStrength 0.48
vid_restart
spdevmap escape1
