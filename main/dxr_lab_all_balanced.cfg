exec dxr_lab_common.cfg
// Recommended main profile: visible RT effects while keeping classic tonemap.
seta r_dxrFallbackLight 0
seta r_dxrShadows 1
seta r_dxrShadowSamples 4
seta r_dxrShadowSoftness 0.70
seta r_dxrShadowStrength 1.05
seta r_dxrShadowMinVisibility 0.02
seta r_dxrDynamicLights 1
seta r_dxrMaxLights 16
seta r_dxrDynamicLightShadows 1
seta r_dxrSun 1
seta r_dxrSunIntensity 0.75
seta r_dxrSunShadowSamples 3
seta r_dxrAO 1
seta r_dxrAOSamples 4
seta r_dxrAOStrength 0.35
seta r_dxrAORadius 24
seta r_dxrReflections 1
seta r_dxrReflectionSamples 1
seta r_dxrReflectionStrength 0.14
seta r_dxrSky 1
seta r_dxrSkySamples 2
seta r_dxrSkyStrength 0.30
seta r_dxrGI 1
seta r_dxrGISamples 1
seta r_dxrGIStrength 0.09
seta r_dxrSpecular 1
seta r_dxrSpecularStrength 1.05
seta r_dxrDenoiser 1
seta r_dxrDenoiserRadius 1
seta r_dxrDenoiserStrength 0.58
seta r_dxrTemporal 0
seta r_dxrTonemap 0
seta r_dxrBloom 0
vid_restart
spdevmap escape1
